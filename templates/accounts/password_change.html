{% extends 'base.html' %}

{% block title %}Зміна пароля - TechShop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Зміна пароля</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Старий пароль</label>
                        {{ form.old_password }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Новий пароль</label>
                        {{ form.new_password1 }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Підтвердіть новий пароль</label>
                        {{ form.new_password2 }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Змінити пароль</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
