{% extends 'base.html' %}

{% block title %}Реєстрація - TechShop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Реєстрація</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Логін</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        {{ form.email }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Телефон</label>
                        {{ form.phone }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        {{ form.password1 }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Підтвердіть пароль</label>
                        {{ form.password2 }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Зареєструватися</button>
                </form>
                <div class="mt-3 text-center">
                    Вже маєте акаунт? <a href="{% url 'accounts:login' %}">Увійти</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
