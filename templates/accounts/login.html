{% extends 'base.html' %}

{% block title %}Вхід - TechShop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Вхід</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Логін або Email</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        {{ form.password }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Увійти</button>
                </form>
                <div class="mt-3 text-center">
                    Немає акаунта? <a href="{% url 'accounts:register' %}">Зареєструватися</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
