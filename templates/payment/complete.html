<!-- templates/payment/complete.html -->
{% extends 'base.html' %}

{% block title %}Оплата успішна - TechShop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center">
        <div class="card border-success">
            <div class="card-body py-5">
                <i class="fas fa-check-circle text-success" style="font-size: 64px;"></i>
                <h1 class="mt-3 mb-3">Оплата успішна!</h1>
                <p class="lead">Дякуємо за покупку!</p>
                <p>Наш менеджер зв'яжеться з вами найближчим часом для підтвердження замовлення.</p>
                <hr>
                <a href="{% url 'shop:home' %}" class="btn btn-primary mt-3">
                    <i class="fas fa-home"></i> На головну
                </a>
                <a href="{% url 'shop:catalog' %}" class="btn btn-outline-primary mt-3">
                    <i class="fas fa-store"></i> Продовжити покупки
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
