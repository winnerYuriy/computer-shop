<!-- templates/payment/cancel.html -->
{% extends 'base.html' %}

{% block title %}Оплата скасована - TechShop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center">
        <div class="card border-warning">
            <div class="card-body py-5">
                <i class="fas fa-times-circle text-warning" style="font-size: 64px;"></i>
                <h1 class="mt-3 mb-3">Оплату скасовано</h1>
                <p class="lead">Ви не завершили оплату.</p>
                <p>Ви можете повторити спробу оплати, оформивши замовлення повторно.</p>
                <hr>
                <a href="{% url 'cart:checkout' %}" class="btn btn-warning mt-3">
                    <i class="fas fa-credit-card"></i> Спробувати знову
                </a>
                <a href="{% url 'shop:catalog' %}" class="btn btn-outline-secondary mt-3">
                    <i class="fas fa-store"></i> Повернутись до каталогу
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
