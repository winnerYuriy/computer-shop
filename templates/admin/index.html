<!-- templates/admin/index.html -->
{% extends "admin/index.html" %}
{% load static %}

{% block content %}
<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px;">
    <div style="background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; padding: 20px; border-radius: 16px;">
        <i class="fas fa-shopping-cart" style="font-size: 32px; margin-bottom: 10px; display: inline-block;"></i>
        <h3 style="margin: 0; font-size: 28px;">{{ total_orders|default:"0" }}</h3>
        <p style="margin: 5px 0 0; opacity: 0.9;">Всього замовлень</p>
    </div>
    <div style="background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 20px; border-radius: 16px;">
        <i class="fas fa-dollar-sign" style="font-size: 32px; margin-bottom: 10px; display: inline-block;"></i>
        <h3 style="margin: 0; font-size: 28px;">{{ total_revenue|default:"0" }}₴</h3>
        <p style="margin: 5px 0 0; opacity: 0.9;">Загальний дохід</p>
    </div>
    <div style="background: linear-gradient(135deg, #f59e0b, #d97706); color: white; padding: 20px; border-radius: 16px;">
        <i class="fas fa-users" style="font-size: 32px; margin-bottom: 10px; display: inline-block;"></i>
        <h3 style="margin: 0; font-size: 28px;">{{ total_customers|default:"0" }}</h3>
        <p style="margin: 5px 0 0; opacity: 0.9;">Клієнтів</p>
    </div>
    <div style="background: linear-gradient(135deg, #ef4444, #dc2626); color: white; padding: 20px; border-radius: 16px;">
        <i class="fas fa-box" style="font-size: 32px; margin-bottom: 10px; display: inline-block;"></i>
        <h3 style="margin: 0; font-size: 28px;">{{ total_products|default:"0" }}</h3>
        <p style="margin: 5px 0 0; opacity: 0.9;">Товарів</p>
    </div>
</div>

{{ block.super }}

<script>
    // Додаємо іконки до пунктів меню
    document.addEventListener('DOMContentLoaded', function() {
        const menuItems = {
            'Products': 'fas fa-box',
            'Categories': 'fas fa-folder',
            'Orders': 'fas fa-truck',
            'Users': 'fas fa-user',
            'Reviews': 'fas fa-star',
            'Attributes': 'fas fa-tags'
        };
        
        document.querySelectorAll('#content-main .module caption').forEach(caption => {
            const text = caption.innerText;
            for (const [key, icon] of Object.entries(menuItems)) {
                if (text.includes(key)) {
                    caption.innerHTML = `<i class="${icon}" style="margin-right: 8px;"></i> ${text}`;
                    break;
                }
            }
        });
    });
</script>
{% endblock %}
